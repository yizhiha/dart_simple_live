name: build-simple-live-app-release-apk

on:
  workflow_dispatch:

jobs:
  build_release_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Restore keystore & key.properties (Release)
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > "$GITHUB_WORKSPACE/simple_live_app/android/app/release.jks"

          cat > "$GITHUB_WORKSPACE/simple_live_app/android/key.properties" <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Pub get
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build release APK
        working-directory: simple_live_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-app-release-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
